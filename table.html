<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Table</title>
        <style>
            table {
                border: 1px solid black;
                border-collapse: collapse;
            }

            td, th {
                border: 1px solid black;
                padding: 5px;
            }

             
        </style>
    </head>
    <body>
        <table> 
            <thead>
                <tr> 
                    <th> Ocean</th>
                    <th> Average Depth</th>
                    <th> Maximum Depth</th>
                </tr> 
                
            </thead>
            <tbody> 
                <tr> 
                    <td> Pacific Ocean</td>
                    <td> 4,000</td>
                    <td> 11,000</td>
                </tr>
                <tr> 
                    <td> Atlantic Ocean</td>
                    <td> 3,000</td>
                    <td> 8,000</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
